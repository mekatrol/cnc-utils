<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 290" role="img" aria-labelledby="title desc">
  <title id="title">Mekatrol PCBCAM splash</title>
  <desc id="desc">Vector of the Mekatrol PCBCAM logo with a PCB icon and bold wordmark.</desc>

  <defs>
    <style>
      .copper { fill: #a3471f; }
      .green { fill: #1a7002; }
      .pcb-fill { fill: #1a7002; }
      .pcb-stroke { stroke: #a3471f; }
      .trace {
        fill: none;
        stroke: #a3471f;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 12;
      }
      .trace-thin {
        fill: none;
        stroke: #a3471f;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 6;
      }
      .wordmark {
        font-family: "Noto Sans Display", "Noto Sans", "DejaVu Sans", sans-serif;
        font-weight: 900;
        letter-spacing: -2px;
      }
    </style>
  </defs>

  <g transform="translate(32 40)">
    <path
      class="pcb-fill pcb-stroke"
      d="M20 12h116l72 72v58h32v70h-136L20 132z"
      stroke-width="10"
      stroke-linejoin="round"
    />

    <path class="trace" d="M38 37l61 61v40"/>
    <path class="trace" d="M47 118h30l27 27"/>
    <path class="trace" d="M128 56v90"/>
    <path class="trace" d="M190 92L134 148"/>
    <path class="trace-thin" d="M141 160h97"/>
    <path class="trace-thin" d="M141 175h97"/>
    <path class="trace-thin" d="M121 190h120"/>

    <circle cx="116" cy="166" r="25" fill="#ffffff" stroke="#a3471f" stroke-width="8"/>
    <circle cx="30" cy="24" r="18" fill="#ffffff" stroke="#a3471f" stroke-width="7"/>
    <circle cx="38" cy="114" r="18" fill="#ffffff" stroke="#a3471f" stroke-width="7"/>
    <circle cx="128" cy="60" r="18" fill="#ffffff" stroke="#a3471f" stroke-width="10"/>
    <circle cx="178" cy="96" r="18" fill="#ffffff" stroke="#a3471f" stroke-width="8"/>
  </g>

  <text x="270" y="139" class="wordmark copper" font-size="108">MEKATROL</text>
  <text x="270" y="257" class="wordmark green" font-size="160">PCBCAM</text>
</svg>
